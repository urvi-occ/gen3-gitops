funnel:
  postgres:
    dbCreate: true
  externalSecrets:
    dbcreds: "dynamically replaced by setup_ci_env.sh script"
    funnelOidcClient: "dynamically replaced by setup_ci_env.sh script"
  funnel:
    Kubernetes:
      JobsNamespace: "dynamically replaced by setup_ci_env.sh script"
      NodeSelector: {"role": "workflow"}
      Tolerations:
      - Key: "role"
        Operator: "Equal"
        Value: "workflow"
        Effect: "NoSchedule"
      Executor:
        restartPolicy: OnFailure
        backoffLimit: 0
        Annotations:
          karpenter.sh/do-not-disrupt: "true"
      Worker:
        restartPolicy: OnFailure
        backoffLimit: 0
        PriorityClassName: "system-cluster-critical"
