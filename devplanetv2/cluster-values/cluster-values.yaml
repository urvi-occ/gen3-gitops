cluster: devplanetv2
project: dev

accountNumber: "707767160287"

alb-controller:
  enabled: true
  hostNetworkEnabled: "true"
  configuration:
    enabled: false

aws-s3-mountpoint:
  enabled: true
  configuration:
    enabled: true

calico:
  enabled: false
  configuration:
    enabled: false

cert-manager:
  enabled: true

cilium:
  enabled: true

coreDNS:
  enabled: true
  configuration:
    enabled: false

crossplane:
  enabled: true

crossplane-crds:
  enable: true
  useIRSA: true
  iamRoleName: "crossplane-test-devplanetv2"

custom-objects:
  enabled: true

ebs-csi-driver:
  enabled: true
  configuration:
    enabled: false

fluentd:
  enabled: false
  configuration:
    enabled: false

kube-state-metrics:
  enabled: true
  configuration:
    enabled: false

grafana-alloy:
  enabled: true
  configuration:
    enabled: false

karpenter:
  enabled: true
  targetRevision: "1.8.6"

karpenter-crds:
  amiSelectorName: "EKS-1-33-al23*"
  enabled: true
  selectorTag: devplanetv2
  migration: true
  default:
    weight: 90
    disruptionBudget: "80%"   
    nodeClassRef:
      apiVersion: karpenter.k8s.aws/v1
      kind: EC2NodeClass
      name: default
    amiFamily: AL2023
    limits:
      memory: 1100Gi
    consolidationPolicy: "WhenEmptyOrUnderutilized"
    consolidateAfter: "1m"
    expireAfter: "72h"
    volumeSize: 80Gi
    requirements:
      - key: karpenter.sh/capacity-type
        operator: In
        values:
          - spot
      - key: capacity-spread
        operator: In
        values: ["2", "3", "4", "5", "6", "7", "8", "9"]  # 9 values = 90%          
      - key: kubernetes.io/arch
        operator: In
        values: [amd64]
      - key: "karpenter.k8s.aws/instance-cpu"
        operator: Gt
        values: ["3"]

  secondary:
    weight: 10  
    enabled: false
    disruptionBudget: "80%"
    nodeClassRef:
      apiVersion: karpenter.k8s.aws/v1
      kind: EC2NodeClass
      name: secondary
    amiFamily: AL2023
    limits:
      memory: 1100Gi
    consolidationPolicy: "WhenEmptyOrUnderutilized"
    consolidateAfter: "1m"
    expireAfter: "72h"
    volumeSize: 80Gi
    requirements:
      - key: karpenter.sh/capacity-type
        operator: In
        values:
          - on-demand
      - key: capacity-spread
        operator: In
        values: ["1"]  # 1 value = 10%          
      - key: kubernetes.io/arch
        operator: In
        values: [amd64]
      - key: "karpenter.k8s.aws/instance-cpu"
        operator: Gt
        values: ["3"]
      - key: "karpenter.k8s.aws/instance-cpu"
        operator: Lt
        values: ["9"]        

metrics-server:
  enabled: true
  hostNetworkEnabled: true
  configuration:
    enabled: false
    
  workflow:
    nodeClassRef:
      apiVersion: karpenter.k8s.aws/v1
      kind: EC2NodeClass
      name: workflow
    amiFamily: AL2023
    volumeSize: 80Gi
    sgSelector: devplanetv2-jupyter
  jupyter:
    nodeClassRef:
      apiVersion: karpenter.k8s.aws/v1
      kind: EC2NodeClass
      name: jupyter
    amiFamily: AL2023
    volumeSize: 80Gi
  gpu:
    enabled: true
    consolidation: true
    consolidateAfter: "30s"
    consolidationPolicy: "WhenEmpty"
    expireAfter: "168h"
    volumeSize: 80Gi
    additionalTags: {}
    requirements:
      - key: karpenter.sh/capacity-type
        operator: In
        values:
          - on-demand
      - key: kubernetes.io/arch
        operator: In
        values:
          - amd64

nvidia-device-plugin:
  enabled: true
  configuration:
    enabled: false
  targetRevision: v0.18.0

vpc-cni:
  enabled: true
  configuration:
    enabled: false
kube-proxy:
  enabled: true
