apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gen3-jcoin
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - path: helm/gen3
      repoURL: https://github.com/uc-cdis/gen3-helm
      targetRevision: chore/icgc-nginx-test
      helm:
        releaseName: gen3-jcoin
        valueFiles:
          - $values/unfunded/jcoin.datacommons.io/values/values.yaml
    - repoURL: 'https://github.com/uc-cdis/gen3-gitops.git'
      targetRevision: feat/jcoin-unfunded
      ref: values
  destination:
    server: "https://kubernetes.default.svc"
    namespace: jcoinhelm
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        role: gen3
    syncOptions:
    - CreateNamespace=true
    automated:
      selfHeal: true
